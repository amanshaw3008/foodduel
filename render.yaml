services:
  - type: web
    name: foodduel-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CACHE_TTL_SECONDS
        value: "900"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SWIGGY_API_KEY
        sync: false
      - key: ZOMATO_API_KEY
        sync: false
